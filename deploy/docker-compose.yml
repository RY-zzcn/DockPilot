services:
  server:
    image: ghcr.io/ry-zzcn/dockpilot-server:latest
    build:
      context: ..
      dockerfile: deploy/Dockerfile.server
    container_name: dockpilot-server
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      TZ: Asia/Shanghai
      DOCKPILOT_TIMEZONE: ${DOCKPILOT_TIMEZONE:-Asia/Shanghai}
      DOCKPILOT_PUBLIC_URL: ${DOCKPILOT_PUBLIC_URL:-http://127.0.0.1:8080}
      DOCKPILOT_ADMIN_USER: ${DOCKPILOT_ADMIN_USER:-admin}
      DOCKPILOT_ADMIN_PASSWORD: ${DOCKPILOT_ADMIN_PASSWORD:?set DOCKPILOT_ADMIN_PASSWORD in .env}
      DOCKPILOT_AUTH_SECRET: ${DOCKPILOT_AUTH_SECRET:?set DOCKPILOT_AUTH_SECRET in .env}
      DOCKPILOT_AGENT_REGISTRATION_TOKEN: ${DOCKPILOT_AGENT_REGISTRATION_TOKEN:?set DOCKPILOT_AGENT_REGISTRATION_TOKEN in .env}
      DOCKPILOT_RELEASE_REPO: ${DOCKPILOT_RELEASE_REPO:-RY-zzcn/DockPilot}
      DOCKPILOT_AGENT_AUTO_UPDATE: ${DOCKPILOT_AGENT_AUTO_UPDATE:-false}
      DOCKPILOT_AGENT_AUTO_UPDATE_VERSION: ${DOCKPILOT_AGENT_AUTO_UPDATE_VERSION:-latest}
    volumes:
      - dockpilot-data:/data

  local-agent:
    image: ghcr.io/ry-zzcn/dockpilot-agent:latest
    build:
      context: ..
      dockerfile: deploy/Dockerfile.agent
    container_name: dockpilot-agent
    restart: unless-stopped
    profiles:
      - agent
    environment:
      TZ: Asia/Shanghai
      DOCKPILOT_SERVER_URL: ${DOCKPILOT_LOCAL_AGENT_SERVER_URL:-http://server:8080}
      DOCKPILOT_REGISTRATION_TOKEN: ${DOCKPILOT_AGENT_REGISTRATION_TOKEN:?set DOCKPILOT_AGENT_REGISTRATION_TOKEN in .env}
      DOCKPILOT_NODE_NAME: ${HOSTNAME:-local-vps}
      DOCKPILOT_COMPOSE_DIRS: /opt,/srv,/var/www
      DOCKPILOT_UPDATE_CACHE_SECONDS: ${DOCKPILOT_UPDATE_CACHE_SECONDS:-900}
      DOCKPILOT_INSTALL_MODE: docker
      DOCKPILOT_RELEASE_REPO: ${DOCKPILOT_RELEASE_REPO:-RY-zzcn/DockPilot}
      DOCKPILOT_AGENT_IMAGE: ${DOCKPILOT_AGENT_IMAGE:-ghcr.io/ry-zzcn/dockpilot-agent}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /opt:/opt
      - /srv:/srv
      - /var/www:/var/www
      - dockpilot-agent-state:/data
    depends_on:
      - server

volumes:
  dockpilot-data:
  dockpilot-agent-state:
    name: ${DOCKPILOT_AGENT_STATE_VOLUME:-dockpilot-agent-state}
