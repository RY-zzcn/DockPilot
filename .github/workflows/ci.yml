name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23.x'

      - name: Go tests
        run: go test ./...

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: web/package.json

      - name: Web build
        working-directory: web
        run: |
          npm install
          npm run build

  docker-build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build server image
        run: docker build -f deploy/Dockerfile.server -t dockpilot-server:ci .

      - name: Build agent image
        run: docker build -f deploy/Dockerfile.agent -t dockpilot-agent:ci .
