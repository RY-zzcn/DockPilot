name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  validate:
    name: Validate repository
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Installer syntax
        run: bash -n scripts/dockpilot-install.sh

      - name: Public content check
        run: node scripts/check-public-content.js

  go-test:
    name: Go tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23.x'

      - name: Prepare Go modules
        run: go mod tidy

      - name: Verify Go modules
        run: go mod verify

      - name: Go tests
        run: go test -mod=mod ./...

  web-build:
    name: Web build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Build web
        working-directory: web
        run: |
          npm ci
          npm run build

  docker-server-build:
    name: Docker server image
    runs-on: ubuntu-latest
    needs:
      - validate
      - go-test
      - web-build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build server image
        run: docker build -f deploy/Dockerfile.server -t dockpilot-server:ci .

  docker-agent-build:
    name: Docker agent image
    runs-on: ubuntu-latest
    needs:
      - validate
      - go-test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build agent image
        run: docker build -f deploy/Dockerfile.agent -t dockpilot-agent:ci .
