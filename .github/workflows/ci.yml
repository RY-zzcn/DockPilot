name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23.x'

      - name: Prepare Go modules
        run: go mod tidy

      - name: Verify Go modules
        run: go mod verify

      - name: Go tests
        run: go test -mod=mod ./...

      - name: Installer syntax
        run: bash -n scripts/dockpilot-install.sh

      - name: Public content check
        run: node scripts/check-public-content.js

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Web build
        working-directory: web
        run: |
          npm ci
          npm run build

  docker-build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build server image
        run: docker build -f deploy/Dockerfile.server -t dockpilot-server:ci .

      - name: Build agent image
        run: docker build -f deploy/Dockerfile.agent -t dockpilot-agent:ci .
