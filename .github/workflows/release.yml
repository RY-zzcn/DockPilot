name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version, for example v0.1.0'
        required: true
        type: string

permissions:
  contents: write
  packages: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  SERVER_IMAGE: ghcr.io/ry-zzcn/dockpilot-server
  AGENT_IMAGE: ghcr.io/ry-zzcn/dockpilot-agent

jobs:
  build-binaries:
    name: Build binaries (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version
        id: vars
        run: |
          TAG="${GITHUB_REF_NAME}"
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.version }}"
          fi
          CLEAN_VERSION="${TAG#v}"
          BUILD_DATE="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "clean_version=${CLEAN_VERSION}" >> "$GITHUB_OUTPUT"
          echo "build_date=${BUILD_DATE}" >> "$GITHUB_OUTPUT"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23.x'

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: web/package.json

      - name: Build web
        working-directory: web
        run: |
          npm install
          npm run build

      - name: Build and package
        run: |
          set -euo pipefail
          LDFLAGS="-s -w -X github.com/dockpilot/dockpilot/internal/version.Version=${{ steps.vars.outputs.clean_version }} -X github.com/dockpilot/dockpilot/internal/version.Commit=${GITHUB_SHA} -X github.com/dockpilot/dockpilot/internal/version.BuildDate=${{ steps.vars.outputs.build_date }}"
          PACKAGE_DIR="dist/package"
          mkdir -p "${PACKAGE_DIR}/web" "${PACKAGE_DIR}/deploy"

          CGO_ENABLED=0 GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} go build -mod=mod -ldflags "${LDFLAGS}" -o "${PACKAGE_DIR}/dockpilot-server" ./cmd/server
          CGO_ENABLED=0 GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} go build -mod=mod -ldflags "${LDFLAGS}" -o "${PACKAGE_DIR}/dockpilot-agent" ./cmd/agent

          cp -R web/dist "${PACKAGE_DIR}/web/dist"
          cp deploy/docker-compose.yml deploy/dockpilot-server.service deploy/dockpilot-agent.service "${PACKAGE_DIR}/deploy/"
          cp README.md "${PACKAGE_DIR}/"

          tar -C "${PACKAGE_DIR}" -czf "dist/dockpilot_${{ steps.vars.outputs.clean_version }}_${{ matrix.goos }}_${{ matrix.goarch }}.tar.gz" .

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: dockpilot_${{ steps.vars.outputs.clean_version }}_${{ matrix.goos }}_${{ matrix.goarch }}
          path: dist/*.tar.gz
          if-no-files-found: error

  publish-release:
    name: Publish GitHub release
    needs: build-binaries
    runs-on: ubuntu-latest
    steps:
      - name: Resolve version
        id: vars
        run: |
          TAG="${GITHUB_REF_NAME}"
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.version }}"
          fi
          CLEAN_VERSION="${TAG#v}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "clean_version=${CLEAN_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.vars.outputs.tag }}
          name: DockPilot ${{ steps.vars.outputs.tag }}
          files: dist/*.tar.gz
          generate_release_notes: true

  publish-images:
    name: Publish GHCR images
    needs: build-binaries
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version
        id: vars
        run: |
          TAG="${GITHUB_REF_NAME}"
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.version }}"
          fi
          CLEAN_VERSION="${TAG#v}"
          BUILD_DATE="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "clean_version=${CLEAN_VERSION}" >> "$GITHUB_OUTPUT"
          echo "build_date=${BUILD_DATE}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push server image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile.server
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.SERVER_IMAGE }}:${{ steps.vars.outputs.tag }}
            ${{ env.SERVER_IMAGE }}:${{ steps.vars.outputs.clean_version }}
            ${{ env.SERVER_IMAGE }}:latest
          build-args: |
            VERSION=${{ steps.vars.outputs.clean_version }}
            COMMIT=${{ github.sha }}
            BUILD_DATE=${{ steps.vars.outputs.build_date }}

      - name: Build and push agent image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile.agent
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.AGENT_IMAGE }}:${{ steps.vars.outputs.tag }}
            ${{ env.AGENT_IMAGE }}:${{ steps.vars.outputs.clean_version }}
            ${{ env.AGENT_IMAGE }}:latest
          build-args: |
            VERSION=${{ steps.vars.outputs.clean_version }}
            COMMIT=${{ github.sha }}
            BUILD_DATE=${{ steps.vars.outputs.build_date }}
