name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version, for example v0.1.1'
        required: true
        type: string

permissions:
  contents: write
  packages: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  SERVER_IMAGE: ghcr.io/ry-zzcn/dockpilot-server
  AGENT_IMAGE: ghcr.io/ry-zzcn/dockpilot-agent

jobs:
  resolve-release:
    name: Resolve release metadata
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.vars.outputs.tag }}
      clean_version: ${{ steps.vars.outputs.clean_version }}
      build_date: ${{ steps.vars.outputs.build_date }}
    steps:
      - name: Resolve version
        id: vars
        run: |
          TAG="${GITHUB_REF_NAME}"
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.version }}"
          fi
          CLEAN_VERSION="${TAG#v}"
          BUILD_DATE="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "clean_version=${CLEAN_VERSION}" >> "$GITHUB_OUTPUT"
          echo "build_date=${BUILD_DATE}" >> "$GITHUB_OUTPUT"

  validate-public-content:
    name: Validate public content
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Public content check
        run: node scripts/check-public-content.js

  build-web:
    name: Build web assets
    needs: validate-public-content
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Build web
        working-directory: web
        run: |
          npm ci
          npm run build

      - name: Upload web artifact
        uses: actions/upload-artifact@v4
        with:
          name: dockpilot-web-dist
          path: web/dist
          if-no-files-found: error

  build-agent-binaries:
    name: Build agent binary (${{ matrix.suffix }})
    needs:
      - resolve-release
      - validate-public-content
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - suffix: linux_amd64
            goos: linux
            goarch: amd64
            goarm: ''
          - suffix: linux_arm64
            goos: linux
            goarch: arm64
            goarm: ''
          - suffix: linux_armv7
            goos: linux
            goarch: arm
            goarm: '7'
          - suffix: linux_armv6
            goos: linux
            goarch: arm
            goarm: '6'
          - suffix: linux_386
            goos: linux
            goarch: '386'
            goarm: ''
          - suffix: linux_riscv64
            goos: linux
            goarch: riscv64
            goarm: ''
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23.x'

      - name: Build and package agent
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm }}
          SUFFIX: ${{ matrix.suffix }}
          VERSION: ${{ needs.resolve-release.outputs.clean_version }}
          BUILD_DATE: ${{ needs.resolve-release.outputs.build_date }}
        run: |
          set -euo pipefail
          LDFLAGS="-s -w -X github.com/dockpilot/dockpilot/internal/version.Version=${VERSION} -X github.com/dockpilot/dockpilot/internal/version.Commit=${GITHUB_SHA} -X github.com/dockpilot/dockpilot/internal/version.BuildDate=${BUILD_DATE}"
          export GOOS GOARCH GOARM CGO_ENABLED=0
          mkdir -p dist

          AGENT_DIR="dist/agent-package"
          rm -rf "${AGENT_DIR}"
          mkdir -p "${AGENT_DIR}/deploy" "${AGENT_DIR}/scripts" "${AGENT_DIR}/docs"
          go build -mod=mod -ldflags "${LDFLAGS}" -o "${AGENT_DIR}/dockpilot-agent" ./cmd/agent
          cp deploy/dockpilot-agent.service "${AGENT_DIR}/deploy/"
          cp scripts/dockpilot-install.sh "${AGENT_DIR}/scripts/"
          cp README.md "${AGENT_DIR}/"
          cp docs/deployment.md "${AGENT_DIR}/docs/"
          tar -C "${AGENT_DIR}" -czf "dist/dockpilot-agent_${VERSION}_${SUFFIX}.tar.gz" .

      - name: Upload agent artifact
        uses: actions/upload-artifact@v4
        with:
          name: dockpilot-agent_${{ needs.resolve-release.outputs.clean_version }}_${{ matrix.suffix }}
          path: dist/*.tar.gz
          if-no-files-found: error

  build-server-binaries:
    name: Build server binary (${{ matrix.suffix }})
    needs:
      - resolve-release
      - validate-public-content
      - build-web
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - suffix: linux_amd64
            goos: linux
            goarch: amd64
            goarm: ''
          - suffix: linux_arm64
            goos: linux
            goarch: arm64
            goarm: ''
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23.x'

      - name: Download web artifact
        uses: actions/download-artifact@v4
        with:
          name: dockpilot-web-dist
          path: web/dist

      - name: Build and package server
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm }}
          SUFFIX: ${{ matrix.suffix }}
          VERSION: ${{ needs.resolve-release.outputs.clean_version }}
          BUILD_DATE: ${{ needs.resolve-release.outputs.build_date }}
        run: |
          set -euo pipefail
          LDFLAGS="-s -w -X github.com/dockpilot/dockpilot/internal/version.Version=${VERSION} -X github.com/dockpilot/dockpilot/internal/version.Commit=${GITHUB_SHA} -X github.com/dockpilot/dockpilot/internal/version.BuildDate=${BUILD_DATE}"
          export GOOS GOARCH GOARM CGO_ENABLED=0
          mkdir -p dist

          SERVER_DIR="dist/server-package"
          rm -rf "${SERVER_DIR}"
          mkdir -p "${SERVER_DIR}/deploy" "${SERVER_DIR}/scripts" "${SERVER_DIR}/docs" "${SERVER_DIR}/web"
          go build -mod=mod -ldflags "${LDFLAGS}" -o "${SERVER_DIR}/dockpilot-server" ./cmd/server
          cp -R web/dist "${SERVER_DIR}/web/dist"
          cp deploy/docker-compose.yml deploy/dockpilot-server.service "${SERVER_DIR}/deploy/"
          cp scripts/dockpilot-install.sh "${SERVER_DIR}/scripts/"
          cp README.md "${SERVER_DIR}/"
          cp docs/deployment.md "${SERVER_DIR}/docs/"
          tar -C "${SERVER_DIR}" -czf "dist/dockpilot-server_${VERSION}_${SUFFIX}.tar.gz" .

          FULL_DIR="dist/full-package"
          rm -rf "${FULL_DIR}"
          mkdir -p "${FULL_DIR}/deploy" "${FULL_DIR}/scripts" "${FULL_DIR}/docs" "${FULL_DIR}/web"
          cp "${SERVER_DIR}/dockpilot-server" "${FULL_DIR}/dockpilot-server"
          go build -mod=mod -ldflags "${LDFLAGS}" -o "${FULL_DIR}/dockpilot-agent" ./cmd/agent
          cp -R web/dist "${FULL_DIR}/web/dist"
          cp deploy/docker-compose.yml deploy/dockpilot-server.service deploy/dockpilot-agent.service "${FULL_DIR}/deploy/"
          cp scripts/dockpilot-install.sh "${FULL_DIR}/scripts/"
          cp README.md "${FULL_DIR}/"
          cp docs/deployment.md "${FULL_DIR}/docs/"
          tar -C "${FULL_DIR}" -czf "dist/dockpilot_${VERSION}_${SUFFIX}.tar.gz" .

      - name: Upload server artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dockpilot-server_${{ needs.resolve-release.outputs.clean_version }}_${{ matrix.suffix }}
          path: dist/*.tar.gz
          if-no-files-found: error

  publish-release:
    name: Publish GitHub release
    needs:
      - resolve-release
      - build-agent-binaries
      - build-server-binaries
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.resolve-release.outputs.tag }}
        run: |
          set -euo pipefail
          gh release create "${TAG}" dist/*.tar.gz \
            --repo "${GITHUB_REPOSITORY}" \
            --title "DockPilot ${TAG}" \
            --generate-notes

  publish-server-image:
    name: Publish server image
    needs:
      - resolve-release
      - validate-public-content
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push server image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile.server
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.SERVER_IMAGE }}:${{ needs.resolve-release.outputs.tag }}
            ${{ env.SERVER_IMAGE }}:${{ needs.resolve-release.outputs.clean_version }}
            ${{ env.SERVER_IMAGE }}:latest
          build-args: |
            VERSION=${{ needs.resolve-release.outputs.clean_version }}
            COMMIT=${{ github.sha }}
            BUILD_DATE=${{ needs.resolve-release.outputs.build_date }}

  publish-agent-image:
    name: Publish agent image
    needs:
      - resolve-release
      - validate-public-content
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push agent image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile.agent
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.AGENT_IMAGE }}:${{ needs.resolve-release.outputs.tag }}
            ${{ env.AGENT_IMAGE }}:${{ needs.resolve-release.outputs.clean_version }}
            ${{ env.AGENT_IMAGE }}:latest
          build-args: |
            VERSION=${{ needs.resolve-release.outputs.clean_version }}
            COMMIT=${{ github.sha }}
            BUILD_DATE=${{ needs.resolve-release.outputs.build_date }}
